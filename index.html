/* ===== LECTURA SEGURA DE LOCALSTORAGE ===== */
function safeGet(key, fallback) {
  try {
    var raw = localStorage.getItem(key);
    if (raw === null || raw === undefined) return fallback;
    var parsed = JSON.parse(raw);
    if (parsed === null || parsed === undefined) return fallback;
    return parsed;
  } catch (e) {
    try { localStorage.removeItem(key); } catch (ex) {}
    return fallback;
  }
}
function safeSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch (e) { return false; }
}
function clearAllData() {
  try {
    var keys = [];
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf("wc26_") === 0) keys.push(k);

function getU(){return safeGet("wc26_u",{})}

function doReg(e,p,cp){
  if(!e||!p)return toast("Completa todos los campos","tE");
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e))return toast("Correo invalido","tE");
  if(p.length<6)return toast("Minimo 6 caracteres","tE");
  if(p!==cp)return toast("Las contrasenas no coinciden","tE");

  u[e]={p:btoa(p)};saveU(u);user=e;sessionStorage.setItem("wc26_s",e);
  toast("Cuenta creada exitosamente","tS");render();
}

/* ===== LOGICA DE GRUPOS ===== */
function calcSt(gi,preds){
  var teams=GR[gi].t.map(function(n){return{name:n,pts:0,gd:0,gf:0,ga:0}});
  MSI.forEach(function(m,mi){
    var key=gi+"_"+mi,r=preds.g[key],gh=0,ga=0;
    if(r==="1"){gh=2;ga=0;teams[m[0]].pts+=3}
    else if(r==="X"){gh=1;ga=1;teams[m[0]].pts+=1;teams[m[1]].pts+=1}
    else if(r==="2"){gh=0;ga=2;teams[m[1]].pts+=3}
    teams[m[0]].gf+=gh;teams[m[0]].ga+=ga;teams[m[0]].gd+=gh-ga;
    teams[m[1]].gf+=ga;teams[m[1]].ga+=gh;teams[m[1]].gd+=ga-gh;
  });
  teams.sort(function(a,b){if(b.pts!==a.pts)return b.pts-a.pts;if(b.gd!==a.gd)return b.gd-a.gd;if(b.gf!==a.gf)return b.gf-a.gf;return a.name.localeCompare(b.name)});
  return teams;
}
function getQual(preds){
  var allSt=GR.map(function(_,i){return calcSt(i,preds)});
  var winners=allSt.map(function(s){return s[0].name});

  return{winners:winners,runners:runners,best3:thirds.slice(0,8).map(function(t){return t.name}),allSt:allSt};
}
function resSlot(s,q){if(s.tp==="w")return q.winners[s.g];if(s.tp==="r")return q.runners[s.g];if(s.tp==="3")return q.best3[s.rk];return"?"}

function getNext(pp,pt,br){return br.map(function(pair){var hn=pp[pair[0]],an=pp[pair[1]];return{home:hn||pt[pair[0]].home,away:an||pt[pair[1]].away,lb:pt[pair[0]].home+" vs "+pt[pair[1]].away}})}
function isGrpDone(p){var c=0;for(var g=0;g<12;g++)for(var m=0;m<6;m++)if(p.g[g+"_"+m])c++;return c===72}
function isPhDone(p,ph){if(ph==="r32")return Object.keys(p.r32).length===16;if(ph==="r16")return Object.keys(p.r16).length===8;if(ph==="qf")return Object.keys(p.qf).length===4;if(ph==="sf")return Object.keys(p.sf).length===2;if(ph==="final")return p.f!==null&&p.t!==null;return false}
function getProg(p){var d=Object.keys(p.g).length;d+=Object.keys(p.r32).length;d+=Object.keys(p.r16).length;d+=Object.keys(p.qf).length;d+=Object.keys(p.sf).length;if(p.f)d++;if(p.t)d++;return d}

var cRAF=null;
function initCanvas(){
  var cv=document.getElementById("hCanvas");if(!cv)return;
  var ctx=cv.getContext("2d"),w,h,pts=[];
  function resize(){w=cv.width=cv.parentElement.offsetWidth;h=cv.height=cv.parentElement.offsetHeight}
  resize();window.addEventListener("resize",resize);
  for(var i=0;i<50;i++)pts.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*2+0.5,dx:(Math.random()-0.5)*0.35,dy:(Math.random()-0.5)*0.25,a:Math.random()*0.4+0.1});
  function draw(){
    ctx.clearRect(0,0,w,h);
    for(var i=0;i<pts.length;i++){var p=pts[i];p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="rgba(212,168,83,"+p.a+")";ctx.fill()}
    for(var i=0;i<pts.length;i++)for(var j=i+1;j<pts.length;j++){var dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<110){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle="rgba(212,168,83,"+(0.05*(1-dist/110))+")";ctx.stroke()}}
    cRAF=requestAnimationFrame(draw);
  }
  draw();
}

  h+='<div style="padding:18px;border-radius:12px;background:var(--card);border:1px solid var(--brd);margin-bottom:24px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span class="font-display" style="font-weight:700">Progreso general</span><span class="font-display" style="font-weight:800;font-size:18px;color:var(--acc)">'+pct+'%</span></div><div class="pBar" style="height:8px;border-radius:4px"><div class="pFill" style="width:'+pct+'%;border-radius:4px"></div></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;text-align:center;font-size:11px;color:var(--txt2)"><div><div style="font-weight:700;font-size:16px;color:var(--txt)">'+Object.keys(preds.g).length+'</div>Grupos</div><div><div style="font-weight:700;font-size:16px;color:var(--txt)">'+Object.keys(preds.r32).length+'</div>Octavos</div><div><div style="font-weight:700;font-size:16px;color:var(--txt)">'+(Object.keys(preds.r16).length+Object.keys(preds.qf).length+Object.keys(preds.sf).length)+'</div>Elim.</div><div><div style="font-weight:700;font-size:16px;color:var(--txt)">'+((preds.f?1:0)+(preds.t?1:0))+'</div>Final</div></div></div>';
  h+='<h3 class="font-display" style="font-weight:700;font-size:16px;margin-bottom:14px">Clasificados por grupo</h3><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px">';
  for(var gi=0;gi<12;gi++){var st=calcSt(gi,preds),done=0;for(var mi=0;mi<6;mi++)if(preds.g[gi+"_"+mi])done++;
  h+='<div style="padding:12px;border-radius:10px;background:var(--card);border:1px solid var(--brd)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="font-display" style="font-weight:800;color:var(--acc)">Grupo '+GR[gi].n+'</span><span style="font-size:10px;color:'+(done===6?"var(--grn)":"var(--mut)")+'">'+done+'/6</span></div>';
  for(var ti=0;ti<3;ti++){var t=st[ti],clr=ti<2?"var(--grn)":"var(--acc)",lb=ti===0?"1ro":ti===1?"2do":"3ro";
  h+='<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px"><span style="width:28px;font-size:9px;font-weight:700;color:'+clr+'">'+lb+'</span><span style="font-size:14px">'+esc(FL[t.name]||"")+'</span><span class="tBdg" style="background:'+TC[t.name]+'">'+esc(AB[t.name])+'</span><span style="font-weight:700;color:'+clr+'">'+t.pts+' pts</span></div>'}
  h+='</div>'}h+='</div>';
  if(isGrpDone(preds)){var q=getQual(preds);h+='<h3 class="font-display" style="font-weight:700;font-size:16px;margin-bottom:14px">Mejores terceros</h3><div style="padding:16px;border-radius:12px;background:var(--card);border:1px solid var(--brd);margin-bottom:24px"><div style="display:flex;flex-wrap:wrap;gap:8px">';
  for(var i=0;i<8;i++){var nm=q.best3[i];h+='<div style="display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:var(--bg2);border:1px solid var(--brd);font-size:12px"><span style="width:20px;font-weight:700;color:var(--acc);font-size:10px">'+(i+1)+'</span><span>'+esc(FL[nm]||"")+'</span><span class="tBdg" style="background:'+TC[nm]+'">'+esc(AB[nm])+'</span></div>'}
  h+='</div></div>'}
  if(isPhDone(preds,"r32")){h+='<h3 class="font-display" style="font-weight:700;font-size:16px;margin-bottom:14px">Bracket eliminatorio</h3>';var r32t=getR32T(preds),phs=[{n:"Octavos",pr:preds.r32,tm:r32t},{n:"Cuartos",pr:preds.r16,tm:getNext(preds.r32,r32t,R16D)},{n:"Semifinal",pr:preds.qf,tm:getNext(preds.r16,getNext(preds.r32,r32t,R16D),QFD)},{n:"Final",pr:preds.sf,tm:getNext(preds.qf,getNext(preds.r16,getNext(preds.r32,r32t,R16D),QFD),SFD)}];
  for(var pi=0;pi<phs.length;pi++){var ph=phs[pi];h+='<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--acc);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">'+esc(ph.n)+'</div>';
  for(var mi=0;mi<ph.tm.length;mi++){var m=ph.tm[mi],sel=ph.pr[mi];h+='<div style="display:flex;align-items:center;gap:5px;padding:4px 0;font-size:12px"><span>'+esc(FL[m.home]||"")+'</span><span class="tBdg" style="background:'+TC[m.home]+';width:24px;height:18px;font-size:7px">'+esc(AB[m.home])+'</span><span style="color:'+(sel===m.home?"var(--grn)":"var(--mut)")+'">'+esc(m.home)+'</span><span style="color:var(--mut);margin:0 3px">vs</span><span>'+esc(FL[m.away]||"")+'</span><span class="tBdg" style="background:'+TC[m.away]+';width:24px;height:18px;font-size:7px">'+esc(AB[m.away])+'</span><span style="color:'+(sel===m.away?"var(--grn)":"var(--mut)")+'">'+esc(m.away)+'</span></div>'}
  h+='</div>'}
  if(preds.f)h+='<div style="padding:12px 16px;border-radius:10px;background:var(--aG);border:1px solid rgba(212,168,83,.15);font-size:13px;display:flex;align-items:center;gap:8px"><i class="fa-solid fa-trophy" style="color:var(--acc)"></i><span style="font-weight:600">'+esc(FL[preds.f]||"")+' '+esc(preds.f)+'</span><span style="color:var(--txt2)">- Campeon</span></div>'}
  return h;
}

/* ===== EVENTOS ===== */
document.addEventListener("click",function(e){
  var el=e.target;
  if(el.classList.contains("sTab")){gTab=parseInt(el.getAttribute("data-gt"));render();return}
  if(el.classList.contains("rBt")&&!el.disabled){var gk=el.getAttribute("data-gk"),gv=el.getAttribute("data-gv"),p=getP();if(p.g[gk]===gv)delete p.g[gk];else p.g[gk]=gv;saveP(p);render();return}
  if(el.classList.contains("kT")&&!el.classList.contains("dis")){var ks=el.getAttribute("data-ks"),ki=el.getAttribute("data-ki"),kv=el.getAttribute("data-kv"),p=getP();
  if(ks==="f")p.f=(p.f===kv)?null:kv;else if(ks==="t")p.t=(p.t===kv)?null:kv;else{if(!p[ks])p[ks]={};var idx=parseInt(ki);if(p[ks][idx]===kv)delete p[ks][idx];else p[ks][idx]=kv}
  saveP(p);render();return}
});

  render();
